# ============================================================
# 卡动文创图鉴 - 数据生成脚本配置模板（多 IP 版）
# ============================================================
# 使用方法：复制为 config.yaml，修改后运行 generate_data.py
#   cp config.example.yaml config.yaml
#   python generate_data.py
# ============================================================

# ---------- 路径配置 ----------
paths:
  # 卡牌图片根目录（包含各 IP 子目录：哆啦A梦 / 三国志8 REMAKE / CF穿越火线）
  # 该目录由上游采集工具 kadong_cards_crawler 生成（见 README 「关联项目」）
  root_dir: "<你的本地图片根目录绝对路径，例如 D:\BaiduSyncdisk\其他\卡动文创图鉴>"
  # data.js 输出路径（默认项目根目录下）
  output_file: "data.js"

# ---------- 图片扫描配置 ----------
scan:
  # 支持的图片扩展名
  image_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"

# ---------- IP 列表（前端单一数据源：generate_data.py 按此生成 data.js，前端运行时直接读取）----------
ips:
  - "哆啦A梦"
  - "三国志8 REMAKE"
  - "CF穿越火线"

# ---------- 各 IP 卡包排序（自定义顺序，未列出的 IP 按文件夹名排序）----------
# 仅哆啦A梦有完整手写顺序；三国志8 REMAKE / CF穿越火线 省略 → 按文件夹名排序
ip_pack_orders:
  "哆啦A梦":
    - "卡牌｜经典版｜第1弹"
    - "卡牌｜豪华版｜第1弹"
    - "卡牌｜珍藏版｜第1弹"
    - "卡牌｜豪华珍藏版｜第1弹"
    - "卡牌｜寻梦卡百宝袋｜第1弹"
    - "卡牌｜地球交响乐｜第1弹"
    - "卡牌｜经典版｜第2弹"
    - "卡牌｜豪华版｜第2弹"
    - "卡牌｜珍藏版｜第2弹"
    - "卡牌｜奇妙珍藏版｜第2弹"
    - "卡牌｜奇妙珍藏卡｜第3弹"
    - "周边｜奇妙世界色纸｜第1弹"
    - "周边｜珍藏版徽章｜第1弹"
    - "周边｜梦想摇摇乐｜第1弹"
    - "周边｜妙趣版立牌｜第1弹"

# ---------- 全局级别排序（从低到高，覆盖 3 个 IP；与 config.js 中 RARITY_ORDER 一致）----------
