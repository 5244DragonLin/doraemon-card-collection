# ============================================================
# 哆啦A梦卡牌收藏站 - 数据生成脚本配置文件
# ============================================================
# 使用方法：复制为 config.yaml，修改后运行 generate_data.py
#   cp config.example.yaml config.yaml
#   python generate_data.py
# ============================================================

# ---------- 路径配置 ----------
paths:
  # 卡牌图片源目录（包含各卡包子目录的根目录）
  # 该目录由上游采集工具 kadong_cards_crawler 生成（见 README 「关联项目」）
  source_dir: "E:/BaiduSyncdisk/其他/卡动文创图鉴/哆啦A梦"
  # data.js 输出路径（默认项目根目录下）
  output_file: "data.js"

# ---------- 图片扫描配置 ----------
scan:
  # 支持的图片扩展名
  image_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"

# ---------- 卡包排序（自定义顺序，未列出的排最后）----------
pack_order:
  - "卡牌｜经典版｜第1弹"
  - "卡牌｜豪华版｜第1弹"
  - "卡牌｜珍藏版｜第1弹"
  - "卡牌｜豪华珍藏版｜第1弹"
  - "卡牌｜寻梦卡百宝袋｜第1弹"
  - "卡牌｜地球交响乐｜第1弹"
  - "卡牌｜经典版｜第2弹"
  - "卡牌｜豪华版｜第2弹"
  - "卡牌｜珍藏版｜第2弹"
  - "卡牌｜奇妙珍藏版｜第2弹"
  - "卡牌｜奇妙珍藏卡｜第3弹"
  - "周边｜奇妙世界色纸｜第1弹"
  - "周边｜珍藏版徽章｜第1弹"
  - "周边｜梦想摇摇乐｜第1弹"
  - "周边｜妙趣版立牌｜第1弹"

# ---------- 级别排序（从低到高，共30项）----------
rarity_order:
  - "R"
  - "SR"
  - "SSR"
  - "UR"
  - "TR"
  - "ZR"
  - "CR"
  - "DR"
  - "SP"
