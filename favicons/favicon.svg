<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 暖金渐变：集卡册的主色调 -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <!-- 卡牌正面 -->
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <!-- 收藏册封面 -->
    <linearGradient id="bookCover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="50%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <!-- 书脊 -->
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D35400"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <!-- 星芒 -->
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <!-- 温暖光晕 -->
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#FFF8E1" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFE0B2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <!-- 卡牌阴影 -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 温暖光晕背景 -->
  <circle cx="256" cy="220" r="200" fill="url(#glow)"/>

  <!-- 装饰星点 -->
  <g fill="#F39C12" opacity="0.4">
    <path d="M 120 160 L 123 170 L 133 173 L 123 176 L 120 186 L 117 176 L 107 173 L 117 170 Z"/>
    <path d="M 400 190 L 403 198 L 411 201 L 403 204 L 400 212 L 397 204 L 389 201 L 397 198 Z"/>
    <path d="M 100 330 L 102 336 L 108 338 L 102 340 L 100 346 L 98 340 L 92 338 L 98 336 Z" opacity="0.3"/>
  </g>

  <!-- ===== 收藏册 ===== -->
  <g>
    <!-- 书脊 -->
    <rect x="152" y="140" width="32" height="260" rx="4" fill="url(#spine)" stroke="#BA4A00" stroke-width="2"/>
    <!-- 书脊上的装饰线 -->
    <line x1="168" y1="160" x2="168" y2="380" stroke="#BA4A00" stroke-width="1" opacity="0.3"/>

    <!-- 封面 -->
    <rect x="182" y="136" width="200" height="268" rx="6" fill="url(#bookCover)" stroke="#BA4A00" stroke-width="2.5" filter="url(#cardShadow)"/>
    <!-- 封面装饰边框 -->
    <rect x="192" y="146" width="180" height="248" rx="4" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2"/>

    <!-- 封面上的"集卡册"文字装饰条 -->
    <rect x="210" y="170" width="144" height="36" rx="18" fill="#FFF" opacity="0.15"/>
    <rect x="210" y="170" width="144" height="36" rx="18" fill="none" stroke="#FFF" stroke-width="1" opacity="0.25"/>

    <!-- 封面上的卡牌图标 -->
    <g transform="translate(282, 260)">
      <!-- 卡牌 -->
      <rect x="-40" y="-52" width="80" height="104" rx="8" fill="url(#cardFace)" stroke="#FFF" stroke-width="3"/>
      <!-- 卡牌上的星星 -->
      <path d="M 0 -30 L 5 -18 L 18 -18 L 8 -9 L 11 4 L 0 -4 L -11 4 L -8 -9 L -18 -18 L -5 -18 Z"
            fill="url(#goldGrad)" stroke="#D68910" stroke-width="1.5"/>
      <!-- 卡牌底部装饰线 -->
      <line x1="-28" y1="30" x2="28" y2="30" stroke="#F39C12" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="-20" y1="40" x2="20" y2="40" stroke="#F39C12" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    </g>
  </g>

  <!-- ===== 前面漂浮的卡牌（立体感） ===== -->
  <g transform="translate(256, 340)">
    <!-- 卡牌 -->
    <rect x="-44" y="-58" width="88" height="116" rx="10" fill="url(#cardFace)" stroke="url(#goldGrad)" stroke-width="4" filter="url(#cardShadow)"/>
    <!-- 内框 -->
    <rect x="-34" y="-48" width="68" height="96" rx="6" fill="none" stroke="#F39C12" stroke-width="1.5" opacity="0.2"/>
    <!-- 收藏星标 -->
    <path d="M 0 -28 L 5 -16 L 18 -16 L 8 -7 L 11 5 L 0 -3 L -11 5 L -8 -7 L -18 -16 L -5 -16 Z"
          fill="url(#starGrad)" stroke="#D68910" stroke-width="1.5"/>
    <!-- 底部装订线 -->
    <line x1="-24" y1="32" x2="24" y2="32" stroke="#F39C12" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-16" y1="42" x2="16" y2="42" stroke="#F39C12" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ===== 右上角"已收藏"角标 ===== -->
  <g transform="translate(370, 150)">
    <circle r="22" fill="#E74C3C" stroke="#FFFFFF" stroke-width="3.5"/>
    <path d="M -9 1 L -3 7 L 10 -6" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>